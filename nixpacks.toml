# Configuration Railway/Nixpacks pour installer Playwright + Chromium

[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "pango",
  "cairo",
  "alsa-lib",
  "mesa",
  "xorg.libxcb",
  "xorg.libX11"
]

[phases.build]
cmds = ["pip install -r requirements.txt", "playwright install chromium"]

[start]
cmd = "gunicorn jobfinder:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
